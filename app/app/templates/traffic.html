{% extends "base.html" %}

{% block content %}
<div class="row mb-3">
    <div class="col-12 text-center">
        <h4><i class="bi bi-graph-up text-primary"></i> Monitoreo de Tráfico en Tiempo Real</h4>
        <p class="text-muted">Mostrando tráfico para el Router IP: <strong>{{ ip }}</strong>, Interfaz Índice: <strong>{{ if_index }}</strong></p>
        <span class="badge bg-secondary mb-2" id="statusBadge">Esperando primer muestreo...</span>
    </div>
</div>

<div class="row">
    <!-- Bits per second (BPS) -->
    <div class="col-md-12 mb-4">
        <div class="card">
            <div class="card-header bg-dark text-white"><h6 class="mb-0">Tráfico (Bits por Segundo)</h6></div>
            <div class="card-body">
                <canvas id="bpsChart" height="80"></canvas>
            </div>
        </div>
    </div>
    
    <!-- Unicast PPS -->
    <div class="col-md-6 mb-4">
        <div class="card">
            <div class="card-header bg-dark text-white"><h6 class="mb-0">Unicast (Paquetes por Segundo)</h6></div>
            <div class="card-body">
                <canvas id="ucastChart"></canvas>
            </div>
        </div>
    </div>
    
    <!-- No-Unicast PPS -->
    <div class="col-md-6 mb-4">
        <div class="card">
            <div class="card-header bg-dark text-white"><h6 class="mb-0">No-Unicast (Paquetes por Segundo)</h6></div>
            <div class="card-body">
                <canvas id="nucastChart"></canvas>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
    const ip = "{{ ip }}";
    const ifIndex = "{{ if_index }}";
    
    // Variables de estado anterior para poder calcular la resta (delta)
    let lastData = null;
    let lastTime = null;

    // Configuración compartida de Chart.js
    const commonOptions = {
        responsive: true,
        animation: false,
        scales: {
            x: { display: false }, // Ocultar eje X por simplicidad
            y: { beginAtZero: true }
        }
    };

    // Inicializar Gráficas
    function initChart(ctxId, labelIn, labelOut, colorIn, colorOut) {
        const ctx = document.getElementById(ctxId).getContext('2d');
        return new Chart(ctx, {
            type: 'line',
            data: {
                labels: Array(20).fill(''), // 20 puntos de historia
                datasets: [
                    { label: labelIn, data: Array(20).fill(0), borderColor: colorIn, tension: 0.3 },
                    { label: labelOut, data: Array(20).fill(0), borderColor: colorOut, tension: 0.3 }
                ]
            },
            options: commonOptions
        });
    }

    const bpsChart = initChart('bpsChart', 'Entrada (bps)', 'Salida (bps)', '#28a745', '#dc3545');
    const ucastChart = initChart('ucastChart', 'Unicast In (pps)', 'Unicast Out (pps)', '#0dcaf0', '#fd7e14');
    const nucastChart = initChart('nucastChart', 'NUcast In (pps)', 'NUcast Out (pps)', '#6f42c1', '#d63384');

    function addData(chart, inVal, outVal) {
        chart.data.datasets[0].data.push(inVal);
        chart.data.datasets[0].data.shift(); // remover el mas viejo
        chart.data.datasets[1].data.push(outVal);
        chart.data.datasets[1].data.shift();
        chart.update();
    }

    function fetchTraffic() {
        document.getElementById('statusBadge').innerText = "Consultando SNMP...";
        document.getElementById('statusBadge').className = "badge bg-warning text-dark mb-2";
        
        fetch(`/api/traffic/${ip}/${ifIndex}`)
            .then(response => response.json())
            .then(data => {
                const now = Date.now();
                if (lastData && lastTime) {
                    const timeDiff = (now - lastTime) / 1000; // Segundos transcurridos
                    
                    // Cálculo de Deltas
                    const inOctetsDiff = data.ifInOctets - lastData.ifInOctets;
                    const outOctetsDiff = data.ifOutOctets - lastData.ifOutOctets;
                    // BPS = (Octetos * 8) / Segundos
                    const inBps = Math.max(0, (inOctetsDiff * 8) / timeDiff);
                    const outBps = Math.max(0, (outOctetsDiff * 8) / timeDiff);
                    
                    // PPS
                    const inUcastPps = Math.max(0, (data.ifInUcastPkts - lastData.ifInUcastPkts) / timeDiff);
                    const outUcastPps = Math.max(0, (data.ifOutUcastPkts - lastData.ifOutUcastPkts) / timeDiff);
                    const inNUcastPps = Math.max(0, (data.ifInNUcastPkts - lastData.ifInNUcastPkts) / timeDiff);
                    const outNUcastPps = Math.max(0, (data.ifOutNUcastPkts - lastData.ifOutNUcastPkts) / timeDiff);

                    // Actualizar Gráficas
                    addData(bpsChart, inBps, outBps);
                    addData(ucastChart, inUcastPps, outUcastPps);
                    addData(nucastChart, inNUcastPps, outNUcastPps);
                    
                    document.getElementById('statusBadge').innerText = "Monitoreando en vivo (Polling 20s)";
                    document.getElementById('statusBadge').className = "badge bg-success mb-2";
                } else {
                    document.getElementById('statusBadge').innerText = "Primer muestreo tomado. Esperando 20s para calcular deltas...";
                    document.getElementById('statusBadge').className = "badge bg-info text-dark mb-2";
                }
                
                lastData = data;
                lastTime = now;
            })
            .catch(err => {
                console.error(err);
                document.getElementById('statusBadge').innerText = "Error consultando SNMP";
                document.getElementById('statusBadge').className = "badge bg-danger mb-2";
            });
    }

    // Polling cada 20 segundos exactos como dicta la rúbrica
    setInterval(fetchTraffic, 20000);
    // Ejecutar primera vez de inmediato
    fetchTraffic();

</script>
{% endblock %}
